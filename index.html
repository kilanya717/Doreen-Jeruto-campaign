<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Doreen Jeruto Campaign</title>
</head>
<body>
    <header>
        <section class="hero">
            <h1>Welcome to Doreen Jeruto's Campaign</h1>
            <p>Your support can make a difference!</p>
        </section>
    </header>
    <main>
        <section class="profile-card">
            <h2>About Doreen</h2>
            <p>Doreen Jeruto is a passionate advocate for change...</p>
        </section>
        <section class="manifesto">
            <h2>Our Manifesto</h2>
            <p>We believe in a brighter future...</p>
        </section>
        <section class="gallery">
            <h2>Gallery</h2>
            <img src="image1.jpg" alt="Gallery Image 1">
            <img src="image2.jpg" alt="Gallery Image 2">
        </section>
        <section class="comments-section">
            <h2>Comments</h2>
            <form id="comment-form">
                <input type="text" id="comment-input" placeholder="Leave a comment...">
                <button type="submit">Submit</button>
            </form>
            <div id="comments-display"></div>
        </section>
    </main>
    <script>
        const form = document.getElementById('comment-form');
        const commentsDisplay = document.getElementById('comments-display');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const commentInput = document.getElementById('comment-input');
            const newComment = document.createElement('p');
            newComment.textContent = commentInput.value;
            commentsDisplay.appendChild(newComment);
            commentInput.value = '';
        });
    </script>
</body>
</html>
